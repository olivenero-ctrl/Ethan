<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦅 Ethan's Study Zone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap');

:root {
  --bg:#0a0a14; --panel:#13132a; --border:#1e2050;
  --green:#00ff88; --yellow:#ffd700; --blue:#4fc3f7; --purple:#bb86fc;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  background-image:
    radial-gradient(ellipse at 15% 15%, rgba(0,255,136,.07) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(79,195,247,.07) 0%, transparent 55%);
}

.eagle {
  font-size: 5rem;
  margin-bottom: 10px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

.title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(10px, 3vw, 18px);
  color: var(--green);
  text-shadow: 0 0 20px rgba(0,255,136,.6);
  letter-spacing: 2px;
  line-height: 1.9;
  text-align: center;
  margin-bottom: 6px;
}
.subtitle {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .82rem;
  color: #555;
  text-align: center;
  margin-bottom: 36px;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  max-width: 360px;
}

.menu-card {
  display: block;
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 22px 20px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 18px;
  cursor: pointer;
  transition: transform .15s, border-color .2s, box-shadow .2s;
  position: relative;
  overflow: hidden;
}
.menu-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.menu-card.quiz::before { background: linear-gradient(90deg, #29B6F6, #FFD600); }
.menu-card.plan::before { background: linear-gradient(90deg, #00ff88, #bb86fc); }

.menu-card:active { transform: scale(.97); }
.menu-card.quiz:hover { border-color: #29B6F6; box-shadow: 0 0 20px rgba(41,182,246,.25); }
.menu-card.plan:hover { border-color: var(--green); box-shadow: 0 0 20px rgba(0,255,136,.2); }

.card-icon { font-size: 2.8rem; flex-shrink: 0; }
.card-info { flex: 1; }
.card-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 2.5vw, 11px);
  color: #e0e0e0;
  line-height: 1.7;
  margin-bottom: 5px;
}
.card-sub { font-size: .78rem; color: #555; line-height: 1.5; }
.card-arrow { font-size: 1.2rem; color: #333; }

.footer {
  margin-top: 32px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #2a2a45;
  text-align: center;
  line-height: 2;
}

/* Stars bg */
.stars-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star-dot {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--d, 3s) ease-in-out infinite var(--dl, 0s);
}
@keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:.6} }
</style>
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<div style="position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;">
  <div class="eagle">🦅</div>
  <div class="title">ETHAN'S<br>STUDY ZONE</div>
  <div class="subtitle">어떤 걸 할까요?</div>

  <div class="menu">
    <a class="menu-card quiz" href="quiz.html">
      <div class="card-icon">📝</div>
      <div class="card-info">
        <div class="card-title">EAGLE QUIZ</div>
        <div class="card-sub">단어 퀴즈 · 시간제한 · 아이템 · 랭킹</div>
      </div>
      <div class="card-arrow">▶</div>
    </a>

    <a class="menu-card plan" href="planner.html">
      <div class="card-icon">🗓️</div>
      <div class="card-info">
        <div class="card-title">SUMMER PLANNER</div>
        <div class="card-sub">여름방학 학습 플래너 · XP · 코인 · 업적</div>
      </div>
      <div class="card-arrow">▶</div>
    </a>
  </div>

  <div class="footer">POWERED BY EAGLE ACADEMY ✦ 2025</div>
</div>

<script>
// Random stars
const bg = document.getElementById('starsBg');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star-dot';
  const size=Math.random()*2+1;
  s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:${Math.random()*3}s;`;
  bg.appendChild(s);
}
</script>
</body>
</html>
