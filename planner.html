<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethan Math Quest v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap');
:root {
  --bg:#0a0a14;--panel:#13132a;--panel2:#0f0f22;--border:#1e2050;
  --green:#00ff88;--gdim:#00cc6a;--yellow:#ffd700;--orange:#ff6b35;
  --blue:#4fc3f7;--purple:#bb86fc;--red:#ff4757;--cyan:#00e5ff;
  --text:#e0e0e0;--dim:#666;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:12px;
  background-image:radial-gradient(ellipse at 15% 15%,rgba(0,255,136,.05) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 85%,rgba(79,195,247,.05) 0%,transparent 55%)}
.px{font-family:'Press Start 2P',monospace}

/* HEADER */
.hdr{text-align:center;padding:20px 0 16px;border-bottom:2px solid var(--border);margin-bottom:16px}
.hdr-t{font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.5vw,16px);color:var(--green);
  text-shadow:0 0 20px rgba(0,255,136,.6);letter-spacing:2px;line-height:1.9}
.hdr-s{margin-top:8px;font-size:12px;color:var(--dim)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sbox{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 6px;text-align:center;position:relative;overflow:hidden}
.sbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sbox.g::before{background:var(--green)}.sbox.y::before{background:var(--yellow)}
.sbox.b::before{background:var(--blue)}.sbox.p::before{background:var(--purple)}
.slbl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--dim);margin-bottom:5px;line-height:1.7}
.sval{font-size:clamp(16px,4vw,24px);font-weight:900}
.sbox.g .sval{color:var(--green)}.sbox.y .sval{color:var(--yellow)}
.sbox.b .sval{color:var(--blue)}.sbox.p .sval{color:var(--purple)}
.sunit{font-size:9px;color:var(--dim);margin-top:2px}

/* XP BAR */
.xpsec{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:14px}
.xphdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.xplbl{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--yellow)}
.xpval{font-size:11px;color:var(--yellow);font-weight:700}
.xpbg{background:#1a1a30;border-radius:4px;height:16px;overflow:hidden;border:1px solid var(--border)}
.xpfill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:4px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}

/* COIN SHOP */
.shop{background:var(--panel);border:1px solid var(--yellow);border-radius:8px;padding:14px;margin-bottom:14px}
.shop-t{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--yellow);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.coin-disp{background:rgba(255,215,0,.1);border:1px solid var(--yellow);border-radius:6px;padding:5px 12px;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--yellow)}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.shop-item{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.shop-item:hover{border-color:var(--yellow);transform:translateY(-2px)}
.shop-item.locked{opacity:.45;cursor:not-allowed}
.shop-icon{font-size:26px;margin-bottom:5px}
.shop-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text);margin-bottom:5px;line-height:1.6}
.shop-cost{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--yellow)}
.shop-desc{font-size:10px;color:var(--dim);margin-top:3px}

/* SECTION */
.sec-t{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--blue);letter-spacing:2px;
  margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border)}

/* WEEK */
.wk{margin-bottom:20px}
.wk-hdr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.wk-badge{font-family:'Press Start 2P',monospace;font-size:7px;padding:4px 8px;border-radius:3px;white-space:nowrap}
.w1{background:rgba(0,255,136,.15);color:var(--green);border:1px solid var(--green)}
.w2{background:rgba(79,195,247,.15);color:var(--blue);border:1px solid var(--blue)}
.w3{background:rgba(187,134,252,.15);color:var(--purple);border:1px solid var(--purple)}
.w4{background:rgba(255,215,0,.15);color:var(--yellow);border:1px solid var(--yellow)}
.wk-desc{font-size:11px;color:var(--dim)}

/* DAY CARD */
.dc{background:var(--panel);border:1px solid var(--border);border-radius:7px;margin-bottom:7px;overflow:hidden;transition:border-color .2s}
.dc:hover{border-color:rgba(79,195,247,.3)}
.dc.done{border-color:var(--gdim)}
.dc.holi{opacity:.5}
.dh{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none}
.dh:hover{background:rgba(255,255,255,.02)}
.ddate{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--dim);min-width:80px}
.ddot{width:9px;height:9px;border-radius:50%;border:2px solid var(--dim);flex-shrink:0;transition:all .2s}
.dc.done .ddot{background:var(--green);border-color:var(--green);box-shadow:0 0 8px var(--green)}
.dtitle{font-size:12px;font-weight:700;flex:1}
.dtag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;white-space:nowrap}
.tc{background:rgba(255,107,53,.2);color:var(--orange)}
.tab{background:rgba(79,195,247,.2);color:var(--blue)}
.tgeo{background:rgba(187,134,252,.2);color:var(--purple)}
.trev{background:rgba(255,215,0,.2);color:var(--yellow)}
.thol{background:rgba(100,100,100,.2);color:var(--dim)}
.dxp{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--yellow);white-space:nowrap}
.dcoin{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--orange);white-space:nowrap}
.dexp{color:var(--dim);font-size:11px;transition:transform .2s}
.dc.open .dexp{transform:rotate(180deg)}

/* DAY BODY */
.db{display:none;padding:10px 12px 12px;border-top:1px solid var(--border);background:rgba(0,0,0,.25)}
.dc.open .db{display:block}
.tl{list-style:none;margin-bottom:10px}
.ti{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
.ti:last-child{border-bottom:none}
.tck{width:17px;height:17px;border:2px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;margin-top:1px}
.ti.done .tck{background:var(--green);border-color:var(--green)}
.ti.done .tck::after{content:'✓';color:#000;font-weight:900;font-size:10px}
.ti.done .ttxt{text-decoration:line-through;color:var(--dim)}
.ttxt{font-size:12px;line-height:1.5;flex:1}
.thint{font-size:10px;color:var(--dim);margin-top:1px}
.ti.ops .ttxt{color:#00e5ff}.ti.ops .tck{border-color:#00e5ff}
.ti.ops.done .tck{background:#00e5ff;border-color:#00e5ff}
.ti.quick .ttxt{color:#ff6b35}.ti.quick .tck{border-color:#ff6b35}
.ti.quick.done .tck{background:#ff6b35;border-color:#ff6b35}
.ti.hw .ttxt{color:#bb86fc}.ti.hw .tck{border-color:#bb86fc}
.ti.hw.done .tck{background:#bb86fc;border-color:#bb86fc}
.memo-l{font-size:9px;color:var(--dim);margin-bottom:4px;font-family:'Press Start 2P',monospace}
.memo-i{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:7px 9px;color:var(--text);font-size:11px;font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:50px;transition:border-color .15s}
.memo-i:focus{outline:none;border-color:var(--blue)}
.cbtn{margin-top:10px;width:100%;padding:9px;background:transparent;border:1px solid var(--green);color:var(--green);border-radius:4px;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;letter-spacing:1px;transition:all .2s}
.cbtn:hover{background:rgba(0,255,136,.1)}
.cbtn.act{background:var(--green);color:#000}

/* ACHIEVEMENTS */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;margin-bottom:20px}
.ach{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:9px;text-align:center;opacity:.3;transition:all .3s}
.ach.ul{opacity:1;border-color:var(--yellow);box-shadow:0 0 10px rgba(255,215,0,.2)}
.ach-ico{font-size:20px;margin-bottom:4px}
.ach-nm{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--yellow);line-height:1.6}
.ach-ds{font-size:9px;color:var(--dim);margin-top:2px}

/* RESET */
.rst{text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.rbtn{background:transparent;border:1px solid var(--red);color:var(--red);padding:7px 18px;border-radius:4px;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;transition:all .2s}
.rbtn:hover{background:rgba(255,71,87,.1)}


.home-btn-wrap{position:fixed;top:12px;right:12px;z-index:1000;}
.home-btn{background:rgba(0,255,136,.15);border:1px solid var(--green);color:var(--green);
  padding:7px 14px;border-radius:6px;font-family:'Press Start 2P',monospace;font-size:7px;
  cursor:pointer;letter-spacing:1px;transition:all .2s;text-decoration:none;display:inline-block;}
.home-btn:hover{background:rgba(0,255,136,.25);}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(90px);
  background:var(--panel);border:1px solid var(--green);color:var(--green);padding:10px 20px;
  border-radius:6px;font-family:'Press Start 2P',monospace;font-size:8px;z-index:2000;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 20px rgba(0,255,136,.3);
  text-align:center;line-height:1.9;max-width:88vw}
.toast.show{transform:translateX(-50%) translateY(0)}

/* MODAL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:3000;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--panel);border:2px solid var(--yellow);border-radius:10px;padding:24px;max-width:340px;width:90%;text-align:center;position:relative}
.modal-t{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--yellow);margin-bottom:12px;line-height:1.7}
.modal-ico{font-size:48px;margin-bottom:10px}
.modal-desc{font-size:13px;color:var(--text);margin-bottom:18px;line-height:1.6}
.modal-close{background:var(--yellow);color:#000;border:none;padding:10px 24px;border-radius:5px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;letter-spacing:1px}
.modal-close:hover{opacity:.85}

/* MINIGAME */
.mg-area{background:#0a0a0a;border:2px solid var(--green);border-radius:8px;padding:12px;margin:10px 0;position:relative;overflow:hidden}
.mg-canvas{display:block;margin:0 auto;border-radius:4px}
.mg-info{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--green);margin-bottom:8px;text-align:center}
.mg-score{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--yellow);text-align:center;margin-top:6px}
.mg-btn{width:100%;padding:8px;background:rgba(0,255,136,.15);border:1px solid var(--green);color:var(--green);border-radius:4px;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;margin-top:8px;letter-spacing:1px}
.mg-btn:hover{background:rgba(0,255,136,.25)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:480px){
  .ddate{min-width:65px;font-size:6px}
  .dtitle{font-size:11px}
  .stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="hdr">
  <div style="font-size:32px">⚔️🧱</div>
  <div class="hdr-t" style="margin-top:8px">ETHAN'S MATH QUEST</div>
  <div class="hdr-t" style="color:var(--blue);font-size:clamp(7px,1.8vw,11px)">여름방학 수학 던전 v2.0</div>
  <div class="hdr-s">7/28 ~ 8/18 · 중1-1 마무리 + 중1-2 완주 (2022 개정)</div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="sbox g"><div class="slbl">DAYS<br>CLEAR</div><div class="sval" id="sDays">0</div><div class="sunit">/ 21일</div></div>
  <div class="sbox y"><div class="slbl">COINS<br>🪙</div><div class="sval" id="sCoins">0</div><div class="sunit">코인</div></div>
  <div class="sbox b"><div class="slbl">TASKS<br>DONE</div><div class="sval" id="sTasks">0</div><div class="sunit">개</div></div>
  <div class="sbox p"><div class="slbl">STREAK<br>🔥</div><div class="sval" id="sStreak">0</div><div class="sunit">연속</div></div>
</div>

<!-- XP BAR -->
<div class="xpsec">
  <div class="xphdr"><span class="xplbl">⭐ QUEST PROGRESS</span><span class="xpval" id="xpLbl">0%</span></div>
  <div class="xpbg"><div class="xpfill" id="xpBar" style="width:0%"></div></div>
</div>

<!-- LEGEND -->
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:6px;font-size:10px">
  <span style="color:#00e5ff">🔢 연산 (매일)</span>
  <span style="color:#ff6b35">⚡ 황소 퀵테준비 (화·목)</span>
  <span style="color:#bb86fc">📚 황소 숙제 (토·일)</span>
</div>

<!-- COIN SHOP -->
<div class="shop">
  <div class="shop-t">
    🏪 REWARD SHOP
    <span style="flex:1"></span>
    <span class="coin-disp">🪙 <span id="shopCoins">0</span></span>
  </div>
  <div class="shop-grid" id="shopGrid"></div>
</div>

<!-- ACHIEVEMENTS -->
<div class="sec-t">🏆 ACHIEVEMENTS</div>
<div class="ach-grid" id="achGrid"></div>

<!-- SCHEDULE -->
<div id="schedule"></div>

<div class="rst"><button class="rbtn" onclick="confirmReset()">⚠ 데이터 초기화</button></div>

<div class="home-btn-wrap"><a class="home-btn" href="index.html">🏠 HOME</a></div>
<div class="toast" id="toast"></div>

<!-- GAME MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-ico" id="mIco"></div>
    <div class="modal-t" id="mTitle"></div>
    <div id="mBody"></div>
    <button class="modal-close" id="mClose" onclick="closeModal()">✕ 닫기</button>
  </div>
</div>

// ══════ PLAN DATA ══════

  {id:"d06",date:"8/2 토",title:"쎈 06 일차방정식의 풀이 — A→B단계 ⚡꼼꼼히",tag:"tab",tl:"꼼꼼히!",xp:130,coin:5,
   tasks:[
    {id:"t019",t:"🔢 연산 (오늘 분량)"},

// ══════ STATE ══════
const KEY="ethan_v2_2026";
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{dayDone:{},taskDone:{},memos:{},coins:0,purchases:0,streak:0,maxStreak:0};}
function save(){try{localStorage.setItem(KEY,JSON.stringify(ST));}catch(e){}}
let ST=load();

// ══════ BUILD SHOP ══════
function buildShop(){
  const g=document.getElementById("shopGrid");
  g.innerHTML="";
  SHOP_ITEMS.forEach(item=>{
    const d=document.createElement("div");
    const locked=ST.coins<item.cost;
    d.className="shop-item"+(locked?" locked":"");
    d.innerHTML=`<div class="shop-icon">${item.icon}</div>
      <div class="shop-name px">${item.name.replace("\n","<br>")}</div>
      <div class="shop-cost">🪙 ${item.cost}</div>
      <div class="shop-desc">${item.desc}</div>`;
    if(!locked) d.onclick=()=>buyItem(item);
    g.appendChild(d);
  });
}

function buyItem(item){
  if(ST.coins<item.cost){showToast("코인이 부족해요! 🪙");return;}
  ST.coins-=item.cost;
  ST.purchases=(ST.purchases||0)+1;
  save();
  updateStats();
  buildShop();
  openGame(item);
}

// ══════ GAMES ══════
function openGame(item){
  const ov=document.getElementById("overlay");
  const modal=document.getElementById("modal");
  document.getElementById("mIco").textContent=item.icon;
  document.getElementById("mTitle").textContent=item.name.replace("\n"," ");
  ov.classList.add("show");

  const body=document.getElementById("mBody");
  if(item.game==="runner") buildRunner(body);

function buildRunner(body){
  body.innerHTML=`
  <div class="mg-area">

    <canvas class="mg-canvas" id="rcv" width="280" height="110"></canvas>
    <div class="mg-score">점수: <span id="rscore">0</span> | 최고: <span id="rhigh">${ST.runnerHigh||0}</span></div>
    <button class="mg-btn" onclick="startRunner()">▶ 시작 / 재시작</button>
  </div>`;
}

function startRunner(){
  const cv=document.getElementById("rcv");if(!cv)return;
  const ctx=cv.getContext("2d");
  const W=cv.width,H=cv.height;
  let player={x:36,y:H-28,w:18,h:22,vy:0,onGround:true};
  let obstacles=[],frame=0,score=0,speed=2.8,alive=true,started=false;
  const GROUND=H-14;

  function jump(){if(player.onGround&&alive){player.vy=-9;player.onGround=false;started=true;}}
  function onKey(e){if(e.code==="Space"||e.code==="Tab"){e.preventDefault();jump();}}
  document.addEventListener("keydown",onKey);
  cv.addEventListener("pointerdown",jump);
  document.getElementById("mClose").addEventListener("click",()=>{
    document.removeEventListener("keydown",onKey);cv.removeEventListener("pointerdown",jump);});

  function spawnObs(){
    const h=18+Math.random()*22;
    obstacles.push({x:W,y:GROUND-h,w:14,h:h});
  }

  function loop(){
    ctx.fillStyle="#0a0a14";ctx.fillRect(0,0,W,H);
    // ground
    ctx.fillStyle="#1e2050";ctx.fillRect(0,GROUND,W,H-GROUND);
    ctx.fillStyle="#4fc3f7";ctx.fillRect(0,GROUND,W,2);
    // player (creeper face)
    ctx.fillStyle=alive?"#00ff88":"#ff4757";
    ctx.fillRect(player.x,player.y,player.w,player.h);
    ctx.fillStyle="#0a0a14";
    ctx.fillRect(player.x+3,player.y+5,4,4);
    ctx.fillRect(player.x+11,player.y+5,4,4);
    ctx.fillRect(player.x+6,player.y+12,6,3);
    ctx.fillRect(player.x+4,player.y+15,3,4);
    ctx.fillRect(player.x+11,player.y+15,3,4);
    // obstacles (TNT blocks)
    obstacles.forEach(o=>{
      ctx.fillStyle="#ff4757";ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.fillStyle="#fff";ctx.font="bold 9px monospace";
      ctx.fillText("TNT",o.x+1,o.y+o.h/2+3);
    });
    // score
    ctx.fillStyle="#ffd700";ctx.font="bold 11px 'Press Start 2P',monospace";
    ctx.fillText("⭐"+score,6,16);
    if(!started){
      ctx.fillStyle="rgba(0,255,136,.7)";ctx.font="8px 'Press Start 2P',monospace";
      ctx.fillText("TOUCH TO START",50,H/2);
    }
    if(!alive){
      ctx.fillStyle="rgba(255,71,87,.85)";ctx.font="9px 'Press Start 2P',monospace";
      ctx.fillText("GAME OVER",80,H/2-8);
      ctx.fillStyle="#ffd700";ctx.font="7px 'Press Start 2P',monospace";
      ctx.fillText("재시작 버튼 누르기",60,H/2+10);
    }
    if(!alive||!started){window._gameRAF=requestAnimationFrame(loop);return;}

    player.vy+=0.55;player.y+=player.vy;
    if(player.y>=GROUND-player.h){player.y=GROUND-player.h;player.vy=0;player.onGround=true;}

    frame++;speed+=0.001;
    if(frame%Math.max(55,90-score*2)===0)spawnObs();
    obstacles.forEach(o=>o.x-=speed);
    obstacles=obstacles.filter(o=>o.x>-30);

    for(const o of obstacles){
      if(player.x+player.w-4<o.x||player.x+4>o.x+o.w)continue;
      if(player.y+player.h-2>o.y&&player.y<o.y+o.h){alive=false;
        if(score>(ST.runnerHigh||0)){ST.runnerHigh=score;save();}
        const el=document.getElementById("rhigh");if(el)el.textContent=ST.runnerHigh||0;
        break;}
    }
    score++;
    const sel=document.getElementById("rscore");if(sel)sel.textContent=score;
    window._gameRAF=requestAnimationFrame(loop);
  }
  if(window._gameRAF)cancelAnimationFrame(window._gameRAF);
  window._gameRAF=requestAnimationFrame(loop);
}

// ── JUMP GAME ──
function buildJump(body){
  body.innerHTML=`
  <div class="mg-area">
    <div class="mg-info">플랫폼을 밟으며 위로 올라가세요!</div>
    <canvas class="mg-canvas" id="jcv" width="280" height="150"></canvas>
    <div class="mg-score">높이: <span id="jheight">0</span>m | 최고: <span id="jhigh">${ST.jumpHigh||0}</span>m</div>
    <button class="mg-btn" onclick="startJump()">▶ 시작 / 재시작</button>
  </div>`;
}
function startJump(){
  const cv=document.getElementById("jcv");if(!cv)return;
  const ctx=cv.getContext("2d");
  const W=cv.width,H=cv.height;
  let px=W/2,py=H-30,pvx=0,pvy=0;
  let platforms=[{x:W/2-25,y:H-15,w:50}];
  let camY=0,height=0,alive=true;
  // gen initial platforms
  for(let i=0;i<8;i++){
    platforms.push({x:Math.random()*(W-50),y:H-15-70*(i+1),w:40+Math.random()*30});
  }
  function keys(){return window._jkeys||{};}
  function kd(e){window._jkeys=window._jkeys||{};window._jkeys[e.key]=true;}
  function ku(e){window._jkeys=window._jkeys||{};window._jkeys[e.key]=false;}
  document.addEventListener("keydown",kd);document.addEventListener("keyup",ku);
  cv.addEventListener("pointerdown",e=>{const r=cv.getBoundingClientRect();window._jpointer=(e.clientX-r.left)/r.width<0.5?"l":"r";});
  cv.addEventListener("pointerup",()=>{window._jpointer=null;});

  function loop(){
    if(!alive){
      ctx.fillStyle="#0a0a14";ctx.fillRect(0,0,W,H);
      ctx.fillStyle="#ff4757";ctx.font="9px 'Press Start 2P',monospace";
      ctx.fillText("GAME OVER!",70,H/2);
      ctx.fillStyle="#ffd700";ctx.font="7px 'Press Start 2P',monospace";
      ctx.fillText("높이: "+height+"m",95,H/2+20);
      window._gameRAF=requestAnimationFrame(loop);return;
    }
    const k=keys();
    const goL=k["ArrowLeft"]||k["a"]||window._jpointer==="l";
    const goR=k["ArrowRight"]||k["d"]||window._jpointer==="r";
    if(goL)pvx=-3;else if(goR)pvx=3;else pvx*=0.7;
    pvy+=0.4;px+=pvx;py+=pvy;
    if(px<0)px=W;if(px>W)px=0;
    // platform collision (falling)
    if(pvy>0){
      for(const pl of platforms){
        const screenY=pl.y-camY;
        if(px>pl.x&&px<pl.x+pl.w&&py+14>screenY&&py+14<screenY+12&&pvy>0){
          pvy=-8.5;height=Math.max(height,Math.round((H-pl.y)/10));
          const el=document.getElementById("jheight");if(el)el.textContent=height;
        }
      }
    }
    // scroll camera
    const screenPy=py-camY;
    if(screenPy<H*0.4)camY-=(H*0.4-screenPy)*0.1;
    // fall off bottom
    if(py-camY>H+20){alive=false;if(height>(ST.jumpHigh||0)){ST.jumpHigh=height;save();}
      const el=document.getElementById("jhigh");if(el)el.textContent=ST.jumpHigh||0;}
    // generate more platforms
    const topPl=Math.min(...platforms.map(p=>p.y));
    while(topPl-camY>0){
      platforms.push({x:Math.random()*(W-50),y:topPl-60-Math.random()*30,w:35+Math.random()*40});
    }
    // draw
    ctx.fillStyle="#0a0a14";ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#1e2050";
    for(let i=0;i<W;i+=20)for(let j=0;j<H;j+=20){
      if((i+j)%40===0){ctx.fillStyle="rgba(30,32,80,.4)";ctx.fillRect(i,j,19,19);}
    }
    platforms.forEach(pl=>{
      const sy=pl.y-camY;
      ctx.fillStyle="#00cc6a";ctx.fillRect(pl.x,sy,pl.w,10);
      ctx.fillStyle="#00ff88";ctx.fillRect(pl.x,sy,pl.w,3);
    });
    // player
    ctx.fillStyle="#4fc3f7";ctx.fillRect(px-8,py-camY-14,16,14);
    ctx.fillStyle="#0a0a14";ctx.fillRect(px-5,py-camY-11,4,4);ctx.fillRect(px+1,py-camY-11,4,4);
    ctx.fillStyle="#ffd700";ctx.font="9px 'Press Start 2P',monospace";
    ctx.fillText("h:"+height,4,15);
    window._gameRAF=requestAnimationFrame(loop);
  }
  if(window._gameRAF)cancelAnimationFrame(window._gameRAF);
  window._gameRAF=requestAnimationFrame(loop);
}

// ── DIAMOND ──
function buildDiamond(body){
  const W=280,H=180,GRID=7;
  const SIZE=Math.floor(W/GRID);
  let grid=[],found=0,moves=30,gameOver=false;
  // init grid: 0=stone, 1=dirt, 2=diamond, 3=gold
  for(let i=0;i<GRID*GRID;i++){
    const r=Math.random();
    grid.push(r<0.06?2:r<0.15?3:r<0.5?1:0);
  }
  const COLORS={"0":"#555","1":"#8B6914","2":"#00e5ff","3":"#ffd700"};
  const EMOJIS={"0":"🪨","1":"🟫","2":"💎","3":"🥇"};

  function draw(){
    const cv=document.getElementById("dmcv");if(!cv)return;
    const ctx=cv.getContext("2d");
    ctx.fillStyle="#0a0a14";ctx.fillRect(0,0,W,H);
    for(let i=0;i<GRID;i++)for(let j=0;j<GRID;j++){
      const idx=j*GRID+i,v=grid[idx];
      if(v===null){ctx.fillStyle="#1e2050";ctx.fillRect(i*SIZE+1,j*SIZE+1,SIZE-2,SIZE-2);continue;}
      ctx.fillStyle=COLORS[v]||"#555";ctx.fillRect(i*SIZE+1,j*SIZE+1,SIZE-2,SIZE-2);
      ctx.font=(SIZE-8)+"px serif";ctx.textAlign="center";
      ctx.fillText(EMOJIS[v]||"",i*SIZE+SIZE/2,j*SIZE+SIZE/2+6);
    }
    ctx.fillStyle="#ffd700";ctx.font="8px 'Press Start 2P',monospace";ctx.textAlign="left";
    ctx.fillText(`💎${found} | 남은:${moves}`,4,H-4);
    if(gameOver){
      ctx.fillStyle="rgba(0,0,0,.7)";ctx.fillRect(0,H/2-20,W,40);
      ctx.fillStyle="#ffd700";ctx.font="9px 'Press Start 2P',monospace";ctx.textAlign="center";
      ctx.fillText(`발굴 완료! 💎 ${found}개`,W/2,H/2+4);
    }
  }
  body.innerHTML=`<div class="mg-area">
    <div class="mg-info">블록을 클릭해서 캐세요! 💎 찾아라!</div>
    <canvas class="mg-canvas" id="dmcv" width="${W}" height="${H}"></canvas>
    <div class="mg-score">💎 <span id="dmfound">0</span>개 발견</div>
  </div>`;
  setTimeout(()=>{
    const cv=document.getElementById("dmcv");if(!cv)return;
    draw();
    cv.addEventListener("pointerdown",e=>{
      if(gameOver)return;
      const r=cv.getBoundingClientRect();
      const x=Math.floor((e.clientX-r.left)/SIZE);
      const y=Math.floor((e.clientY-r.top)/SIZE);
      if(x<0||x>=GRID||y<0||y>=GRID)return;
      const idx=y*GRID+x;
      if(grid[idx]===null)return;
      if(grid[idx]===2){found++;showToast("💎 다이아몬드 발견! +1");}
      else if(grid[idx]===3){showToast("🥇 금광 발견!");}
      grid[idx]=null;moves--;
      const el=document.getElementById("dmfound");if(el)el.textContent=found;
      if(moves<=0){gameOver=true;if(found>=(ST.diamondHigh||0)){ST.diamondHigh=found;save();}}
      draw();
    });
  },100);
}

// ══════ INTERACTIONS ══════
function toggleCard(id){const el=document.getElementById("dc-"+id);if(el)el.classList.toggle("open");}

function toggleTask(dayId,taskId){
  ST.taskDone[taskId]=!ST.taskDone[taskId];save();
  const el=document.querySelector(`[data-t="${taskId}"]`);
  if(el)el.classList.toggle("done",ST.taskDone[taskId]);
  updateStats();
}

function saveMemo(dayId,val){ST.memos[dayId]=val;save();}

function toggleDay(dayId){
  const wasDone=ST.dayDone[dayId];
  ST.dayDone[dayId]=!ST.dayDone[dayId];
  updateStreaks();save();
  const dc=document.getElementById("dc-"+dayId);
  const btn=document.getElementById("cb-"+dayId);
  if(dc)dc.classList.toggle("done",ST.dayDone[dayId]);
  if(btn){btn.textContent=ST.dayDone[dayId]?"✓ DAY CLEARED!":"▶ DAY COMPLETE";btn.classList.toggle("act",ST.dayDone[dayId]);}
  if(ST.dayDone[dayId]&&!wasDone){
    const day=findDay(dayId);
    ST.coins=(ST.coins||0)+day.coin;save();
    showToast(`+${day.coin} 🪙 코인 획득!\n+${day.xp} ⭐ XP!`);
  }
  updateStats();buildShop();checkAchievements();
}

function updateStreaks(){
  let allDays=[];
  PLAN.forEach(w=>w.days.forEach(d=>{if(!d.holiday)allDays.push(d.id);}));
  let cur=0,max=0;
  for(const id of allDays){if(ST.dayDone[id]){cur++;max=Math.max(max,cur);}else cur=0;}
  ST.maxStreak=max;
}

function findDay(id){for(const w of PLAN)for(const d of w.days)if(d.id===id)return d;return{coin:0,xp:0};}

function updateStats(){
  let days=0,tasks=0,totalXp=0;
  PLAN.forEach(w=>w.days.forEach(d=>{
    if(ST.dayDone[d.id]){days++;totalXp+=d.xp;}
    d.tasks.forEach(t=>{if(ST.taskDone[t.id])tasks++;});
  }));
  const coins=ST.coins||0;
  document.getElementById("sDays").textContent=days;
  document.getElementById("sCoins").textContent=coins;
  document.getElementById("sTasks").textContent=tasks;
  document.getElementById("sStreak").textContent=ST.maxStreak||0;
  document.getElementById("shopCoins").textContent=coins;
  const pct=Math.round(days/21*100);
  document.getElementById("xpBar").style.width=pct+"%";
  document.getElementById("xpLbl").textContent=pct+"%";
  ST._cd=days;
}

function checkAchievements(){
  const s={...ST,completedDays:ST._cd||0,maxStreak:ST.maxStreak||0};
  ACHS.forEach(a=>{
    const el=document.getElementById("ach-"+a.id);
    if(el&&a.chk(s)&&!el.classList.contains("ul")){
      el.classList.add("ul");
      showToast("🏆 업적 해제!\n"+a.nm.replace("\n"," "));
    }
  });
}

function restoreAchs(){
  const s={...ST,completedDays:ST._cd||0,maxStreak:ST.maxStreak||0};
  ACHS.forEach(a=>{const el=document.getElementById("ach-"+a.id);if(el&&a.chk(s))el.classList.add("ul");});
}

let _toastT;
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerHTML=msg.replace(/\n/g,"<br>");
  t.classList.add("show");clearTimeout(_toastT);
  _toastT=setTimeout(()=>t.classList.remove("show"),2800);
}

function confirmReset(){
  if(confirm("정말 초기화할까요? 모든 진도와 코인이 삭제됩니다.")){
    ST={dayDone:{},taskDone:{},memos:{},coins:0,purchases:0,streak:0,maxStreak:0};
    save();buildShop();buildSchedule();buildAchs();updateStats();
    showToast("초기화 완료! 새 게임 시작 🎮");
  }
}

// ══════ INIT ══════
buildAchs();buildSchedule();buildShop();updateStats();
setTimeout(restoreAchs,100);
</script>
